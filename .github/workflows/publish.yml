name: publish

# On merge to main: cut an auto-incremented semver tag + release so consumers can
# pin a version (and the jsdelivr @<tag> / @latest URLs resolve to a real release).
# It does NOT commit to main: validate.yml already guarantees the committed
# index.json/.md twins are current, so publish only validates, tags, and releases.
# (Tag refs aren't covered by branch protection, so the bot can still push them.)
on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "schema/**"
      - "scripts/**"

permissions:
  contents: write

concurrency:
  # Never let two publishes race on the tag counter.
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install jsonschema

      - name: Validate before publishing
        run: python scripts/validate.py

      - name: Sync Supabase mirror
        # Push the freshly-merged dataset into the queryable Supabase mirror.
        # Skips gracefully if the secrets aren't configured, so it never blocks a
        # release; the repo remains the source of truth regardless.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Supabase secrets not set — skipping mirror sync."
            exit 0
          fi
          python sync/sync_supabase.py

      - name: Compute next semver tag
        id: version
        run: |
          git fetch --tags --force
          latest=$(git tag -l 'v*.*.*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            next="v1.0.0"
          else
            v=${latest#v}
            IFS='.' read -r MAJ MIN PAT <<< "$v"
            next="v${MAJ}.${MIN}.$((PAT + 1))"
          fi
          echo "Previous tag: ${latest:-<none>} -> next: $next"
          echo "tag=$next" >> "$GITHUB_OUTPUT"

      - name: Tag and publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(python -c "import json;print(json.load(open('data/index.json'))['count'])")
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "Open WOD Database — ${count} structured benchmark WODs.

          Consume the compiled bundle:
          \`https://cdn.jsdelivr.net/gh/wodwiz/open-wod-db@${{ steps.version.outputs.tag }}/data/index.json\`

          Data licensed CC BY 4.0; code MIT." \
            --generate-notes
