name: validate

# Gate every change to the dataset against the schema contract so community
# PRs can be accepted without hand-reviewing each entry.
#
# Runs on EVERY pull request with no `paths:` filter — deliberately. This job is a
# required status check in branch protection, and a required check that gets
# skipped by a path filter never reports a status, which blocks the PR from
# merging forever. The job takes seconds, so always running it keeps it safe to
# require.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install jsonschema

      - name: Validate entries against schema
        run: python scripts/validate.py

      - name: Verify committed data artifacts are current
        # Re-derive the compiled artifacts (movements.json, index.json, .md twins)
        # and fail if they differ from what was committed. Keeps main
        # self-consistent so publish.yml never has to push a fix-up commit back to
        # the protected branch. build_movements.py also errors if a WOD references
        # a movement not registered in the library.
        run: |
          python scripts/build_movements.py
          python scripts/build_index.py
          if [ -n "$(git status --porcelain data/)" ]; then
            echo "::error::data artifacts are out of date. Run scripts/build_movements.py and scripts/build_index.py and commit the result."
            git --no-pager diff -- data/
            exit 1
          fi
          echo "Compiled artifacts are up to date."
